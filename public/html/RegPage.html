<!DOCTYPE html>
<html>

<head>
    <title>Поле ввода со списком</title>
    <link rel="stylesheet" href="/public/styles/style.css">
    <link rel="icon" href="/public/img/favicon.ico" type="image/x-icon">
</head>

<body>
    <img src="/public/img/background_white.jpg" class="background">
    <div class="reg">
        <!-- заголовок регистрации -->
        <div class="tit_reg"></div>

        <label for="myInput">Выберите район:</label>
        <input type="text" id="myInput" list="myList">
        <datalist id="myList">
            <option value="Башмаковский район">
            <option value="Бековский Район">
            <option value="Белинский район">
            <option value="Бессоновский район">
            <option value="Вадинский район">
            <option value="Город Заречный">
            <option value="Город Кузнецк">
            <option value="Город Пенза">
            <option value="Городищенский район">
            <option value="Земетчинский район">
            <option value="Иссинский район">
            <option value="Каменский район">
            <option value="Камешкирский район">
            <option value="Колышлейский район">
            <option value="Кузнецкий район">
            <option value="Лопатинский район">
            <option value="Лунинский район">
            <option value="Малосердобинский район">
            <option value="Мокшанский район">
            <option value="Наровчатский район">
            <option value="Неверкинский район">
            <option value="Нижнеломовский район">
            <option value="Никольский район">
            <option value="Пачелмский район">
            <option value="Пензенский район">
            <option value="Сердобский район">
            <option value="Сосновоборский район">
            <option value="Спасский район">
            <option value="Тамалинский район">
            <option dis="Шемышейский район ОО" value="Шемышейский район">
        </datalist>
        
    </div>
    <script>
        var input = document.getElementById("myInput");
        // Слушаем событие изменения значения поля ввода
        input.addEventListener("change", function () {
            var selectedOption = input.value;
            console.log(selectedOption)
            // Создаем объект запроса
            var xhr = new XMLHttpRequest();
            var param1Value = selectedOption;
            var url = 'http://attest.edu-penza.ru:8181/registration/regme?disctrict=' + encodeURIComponent(param1Value) + '&spec=child'
            xhr.open('GET', url, true);
            xhr.timeout = 5000;
            xhr.responseType = 'blob'; // Указываем тип ответа как blob

            xhr.onload = function () {
                if (xhr.status === 200) {
                    var blob = xhr.response;
                    var downloadLink = document.createElement('a');
                    downloadLink.href = window.URL.createObjectURL(blob);
                    downloadLink.download = 'Результаты.zip';
                    downloadLink.click();
                } else {
                    console.log('Неуспешный ответ:', xhr.status, xhr.statusText);
                    alert("");
                }
            };
        });
    </script>
</body>

</html>
