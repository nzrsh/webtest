    <div class="reg" style="min-height: 533px;">

                <option value="Мокшанский район УО">Мокшанский район</option>
                <option value="Наровчатский район ОО">Наровчатский район</option>

            <p style="margin-top: 7%;">2. Выберите тип учереждения:</p>

            <div class="radiobutton" style="font-size: 17px;"><input id="two" name="rate_2" type="radio"

            <label for="myInput2"> 3. Выберите учереждение:</label>
            <input type="text" id="myInput2" list="myList2" style="margin-top: 7%;" disabled>
            <datalist id="myList2">
            </datalist>

            <input class="reg_input_area" id="login" type="text" name="login" placeholder="Введите логин" />
            <input class="reg_input_area" id="password" type="text" name="password" placeholder="Введите пароль" />
            <div class ="d_p">
                <label for="password2" class="remarka" id="pas_lab">я устал</label>
                <input class="reg_input_area" id="password2" type="text" name="password"

        <button class="reg_bat" onclick="registration()">Зарегистрироваться</button>
        <script src="/public/js/RegPageScript.js">
